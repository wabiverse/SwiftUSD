name: Run Tests (Ubuntu x86/64)

on: [push]

jobs:
  build:
    name: Swift ${{ matrix.swift }} on ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        swift: ["6.3.2"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: swift-actions/setup-swift@v3
        with:
          swift-version: ${{ matrix.swift }}
          skip-verify-signature: true
      - uses: actions/checkout@v4
      - name: 🔥 Refresh Index
        run: sudo apt update && sudo apt install -y liblzma-dev
      - name: 👨‍💻 Install CxxStdlib
        run: sudo apt install libstdc++-12-dev
      - name: 🗜️ Install DEFLATE
        run: sudo apt install libdeflate-dev
      - name: 📙 Install BZ2
        run: sudo apt install libbz2-dev
      - name: 📓 Install ZLib
        run: sudo apt install zlib1g-dev
      - name: 🐍 Install Python
        run: sudo apt install python3-dev
      - name: 🖼 Install FreeGLUT
        run: sudo apt install freeglut3-dev
      - name: 🚀 Install Boost
        run: sudo apt install libboost-all-dev
      - name: Install OpenGL
        run: sudo apt install libgl1-mesa-dev libgl1-mesa-dri xvfb
      - name: 🖥️ Install X11
        run: sudo apt install libxcursor-dev libxt-dev libxi-dev libxinerama-dev libxrandr-dev
      - name: 💻 Install GTK
        run: sudo apt install libgtk-4-dev clang
      - name: 🔨 Build
        run: swift build --target UsdView
      - name: 🎬 Run
        run: |
          xvfb-run --auto-servernum .build/debug/UsdView &
          PID=$!
          sleep 10
          if ! kill -0 $PID 2>/dev/null; then
            echo "UsdView crashed during startup"
            exit 1
          fi
          kill $PID
          wait $PID 2>/dev/null
          exit 0
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          GDK_BACKEND: "x11"
