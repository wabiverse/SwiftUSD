name: Swift (Ubuntu x86/64)

on: [push]

jobs:
  build:
    name: Swift ${{ matrix.swift }} on ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        swift: ["6.3.2"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: swift-actions/setup-swift@v3
        with:
          swift-version: ${{ matrix.swift }}
          skip-verify-signature: true
      - uses: actions/checkout@v4
      - name: 🔥 Refresh Index
        run: sudo apt update && sudo apt install -y liblzma-dev
      - name: 👨‍💻 Install CxxStdlib
        run: sudo apt install libstdc++-12-dev
      - name: 🗜️ Install DEFLATE
        run: sudo apt install libdeflate-dev
      - name: 📙 Install BZ2
        run: sudo apt install libbz2-dev
      - name: 📓 Install ZLib
        run: sudo apt install zlib1g-dev
      - name: 🐍 Install Python
        run: sudo apt install python3-dev
      - name: 🖼 Install FreeGLUT
        run: sudo apt install freeglut3-dev
      - name: 🚀 Install Boost
        run: sudo apt install libboost-all-dev
      - name: 🖥️ Install X11
        run: sudo apt install libxcursor-dev libxt-dev libxi-dev libxinerama-dev libxrandr-dev
      - name: 💻 Install GTK
        run: sudo apt install libgtk-4-dev clang
      - name: ✨ Install xcbeautify
        run: |
          git clone https://github.com/cpisciotta/xcbeautify.git
          cd xcbeautify && make install && cd .. && rm -rf xcbeautify
      - name: 🔨 Build
        run: set -o pipefail && swift build --build-system swiftbuild -c release --product UsdView | xcbeautify --preserve-unbeautified --renderer github-actions
      - name: 📚 Create Monolithic Library
        run: |
          mkdir -p /tmp/artifacts
          set -o pipefail && swift build --build-system swiftbuild -c release --product swiftusd_m | xcbeautify --preserve-unbeautified --renderer github-actions
          cp .build/out/Products/Release-linux/libswiftusd_m.a /tmp/artifacts/libswiftusd_m.a
      - name: 📂 Create Single Shared C++ Include Directory
        run: |
          find Sources .build/checkouts \( -path "*/include/*.h" -o -path "*/include/*.modulemap" \) | while read f; do
            rel="${f#*/include/}"
            dest="/tmp/artifacts/include/$rel"
            mkdir -p "$(dirname "$dest")"
            cp -f "$f" "$dest"
          done
      - name: 📋 Generate Build Metadata
        run: |
          USD_VER=$(grep 'define PXR_VERSION' Sources/pxr/include/pxr/pxrns.h | grep -o '[0-9]*')
          USD_MAJOR=$((USD_VER / 100))
          USD_MINOR=$(printf "%02d" $((USD_VER % 100)))
          USD_VERSION="$USD_MAJOR.$USD_MINOR"
          SWIFT_VERSION="$(swift --version 2>&1 | head -1)"
          GIT_COMMIT="$(git rev-parse HEAD)"
          GIT_BRANCH="$(git rev-parse --abbrev-ref HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          mkdir -p /tmp/artifacts/lib/pkgconfig /tmp/artifacts/lib/cmake/SwiftUSD

          cat > /tmp/artifacts/build-info.json << EOF
          {
            "usd_version": "$USD_VERSION",
            "swift_version": "$SWIFT_VERSION",
            "git_commit": "$GIT_COMMIT",
            "git_branch": "$GIT_BRANCH",
            "build_date": "$BUILD_DATE",
            "platform": "linux",
            "arch": "x86_64",
            "configuration": "release"
          }
          EOF

          cat > /tmp/artifacts/lib/pkgconfig/SwiftUSD.pc << EOF
          prefix=/usr/local
          libdir=\${prefix}/lib
          includedir=\${prefix}/include

          Name: SwiftUSD
          Description: OpenUSD monolithic static library for C++ and Swift consumers
          Version: $USD_VERSION
          Libs: -L\${libdir} -lswiftusd_m
          Cflags: -I\${includedir}
          EOF

          cat > /tmp/artifacts/lib/cmake/SwiftUSD/SwiftUSDConfig.cmake << EOF
          set(SwiftUSD_VERSION $USD_VERSION)
          set(SwiftUSD_INCLUDE_DIRS "\${CMAKE_CURRENT_LIST_DIR}/../../../include")
          set(SwiftUSD_LIBRARY_DIRS "\${CMAKE_CURRENT_LIST_DIR}/../../..")
          set(SwiftUSD_LIBRARIES swiftusd_m)
          set(SwiftUSD_LINK_FLAGS "-Wl,--whole-archive -lswiftusd_m -Wl,--no-whole-archive")
          EOF
      - name: 📦 Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: usdview-release-artifacts
          path: |
            /tmp/artifacts/include
            /tmp/artifacts/lib
            /tmp/artifacts/build-info.json
            /tmp/artifacts/libswiftusd_m.a
            .build/out/Products/Release-linux/UsdView
            .build/out/Products/Release-linux/*.so
            .build/out/Products/Release-linux/*.a
            .build/out/Products/Release-linux/*.bundle
            .build/out/Products/Release-linux/*.resources
            .build/out/Products/Release-linux/*.dSYM
            .build/out/Products/Release-linux/*.debug
            .build/out/Products/Release-linux/*.swiftmodule
