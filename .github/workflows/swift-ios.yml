name: Swift (iOS 18)

on: [push]

jobs:
  build:
    name: Swift ${{ matrix.swift }} on iOS
    strategy:
      matrix:
        os: [macos-26]
        swift: ["6.3.2"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: 🦦 Install Swift Bundler
        run: |
          curl -o swift-bundler -L https://github.com/wabiverse/wabi-swift-bundler/releases/download/v3.0.5/swift-bundler
          chmod +x ./swift-bundler
          sudo cp ./swift-bundler /usr/local/bin/
          rm ./swift-bundler
      - name: 📦 Build & Bundle
        run: xcodebuild -scheme UsdView -destination 'platform=iOS Simulator,name=iPhone 17'
      - name: 📦 Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: usdview-ios-artifacts
          path: .build/bundler/apps/UsdView/UsdView.app
